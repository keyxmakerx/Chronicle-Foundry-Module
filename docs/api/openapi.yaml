        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    BearerApiKey:
      type: http
      scheme: bearer
      description: >
        API key passed as Bearer token. Keys are scoped to a single campaign
        with permission levels: read, write, sync. Rate limited per key.

  parameters:
    campaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
    entityId:
      name: entityId
      in: path
      required: true
      schema:
        type: string
    typeId:
      name: typeId
      in: path
      required: true
      schema:
        type: integer
    eventId:
      name: eventId
      in: path
      required: true
      schema:
        type: string
    mediaId:
      name: mediaId
      in: path
      required: true
      schema:
        type: string
    mapId:
      name: mapId
      in: path
      required: true
      schema:
        type: string
    drawingId:
      name: drawingId
      in: path
      required: true
      schema:
        type: string
    tokenId:
      name: tokenId
      in: path
      required: true
      schema:
        type: string
    layerId:
      name: layerId
      in: path
      required: true
      schema:
        type: string
    fogId:
      name: fogId
      in: path
      required: true
      schema:
        type: string
    mappingId:
      name: mappingId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      properties:
        code:
          type: integer
        type:
          type: string
        message:
          type: string

    StatusOk:
      type: object
      properties:
        status:
          type: string
          example: ok

    # --- Campaigns ---
    Campaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        is_public:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # --- Entities ---
    EntityType:
      type: object
      properties:
        id:
          type: integer
        campaign_id:
          type: string
        slug:
          type: string
        name:
          type: string
        name_plural:
          type: string
        icon:
          type: string
        color:
          type: string
        description:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldDefinition"
        layout:
          type: object
          description: Row-based page layout
        sort_order:
          type: integer
        is_default:
          type: boolean
        enabled:
          type: boolean

    FieldDefinition:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, number, select, textarea, checkbox, url]
        section:
          type: string
        options:
          type: array
          items:
            type: string

    Entity:
      type: object
      properties:
        id:
          type: string
        campaign_id:
          type: string
        entity_type_id:
          type: integer
        name:
          type: string
        slug:
          type: string
        entry:
          type: string
          nullable: true
          description: ProseMirror JSON document
        entry_html:
          type: string
          nullable: true
        image_path:
          type: string
          nullable: true
        parent_id:
          type: string
          nullable: true
        type_label:
          type: string
          nullable: true
        is_private:
          type: boolean
        is_template:
          type: boolean
        fields_data:
          type: object
          additionalProperties: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        type_name:
          type: string
        type_icon:
          type: string
        type_color:
          type: string
        type_slug:
          type: string
        tags:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              color:
                type: string

    PaginatedEntities:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Entity"
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    CreateEntityRequest:
      type: object
      required: [name, entity_type_id]
      properties:
        name:
          type: string
        entity_type_id:
          type: integer
        type_label:
          type: string
        is_private:
          type: boolean
          default: false
        fields_data:
          type: object
          additionalProperties: true

    UpdateEntityRequest:
      type: object
      properties:
        name:
          type: string
        type_label:
          type: string
        is_private:
          type: boolean
        entry:
          type: string
          description: ProseMirror JSON document
        fields_data:
          type: object
          additionalProperties: true

    Relation:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: string
        sourceEntityId:
          type: string
        targetEntityId:
          type: string
        relationType:
          type: string
        reverseRelationType:
          type: string
        metadata:
          type: object
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        targetEntityName:
          type: string
        targetEntityIcon:
          type: string
        targetEntityColor:
          type: string
        targetEntitySlug:
          type: string
        targetEntityType:
          type: string

    # --- Calendar ---
    Calendar:
      type: object
      properties:
        id:
          type: string
        campaign_id:
          type: string
        mode:
          type: string
          enum: [fantasy, reallife]
        name:
          type: string
        description:
          type: string
          nullable: true
        epoch_name:
          type: string
          nullable: true
        current_year:
          type: integer
        current_month:
          type: integer
        current_day:
          type: integer
        current_hour:
          type: integer
        current_minute:
          type: integer
        hours_per_day:
          type: integer
        minutes_per_hour:
          type: integer
        seconds_per_minute:
          type: integer
        leap_year_every:
          type: integer
        leap_year_offset:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        months:
          type: array
          items:
            $ref: "#/components/schemas/Month"
        weekdays:
          type: array
          items:
            $ref: "#/components/schemas/Weekday"
        moons:
          type: array
          items:
            $ref: "#/components/schemas/Moon"
        seasons:
          type: array
          items:
            $ref: "#/components/schemas/Season"
        eras:
          type: array
          items:
            $ref: "#/components/schemas/Era"
        event_categories:
          type: array
          items:
            $ref: "#/components/schemas/EventCategory"

    CalendarDate:
      type: object
      properties:
        mode:
          type: string
        year:
          type: integer
        month:
          type: integer
