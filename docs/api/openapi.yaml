openapi: 3.0.3
info:
  title: Chronicle API
  version: 1.0.0
  description: REST API for Chronicle, a self-hosted TTRPG worldbuilding platform. Provides programmatic access to campaign data for external tool integration (Foundry VTT, custom scripts).

servers:
  - url: "{baseUrl}/api/v1"
    variables:
      baseUrl:
        default: http://localhost:8080
        description: Chronicle server base URL

security:
  - BearerApiKey: []

tags:
  - name: Campaigns
    description: Campaign details
  - name: Entities
    description: Worldbuilding entities (characters, locations, items, etc.)
  - name: Calendar
    description: Fantasy calendar, events, and date management
  - name: Media
    description: Campaign media file management
  - name: Maps
    description: Interactive maps, drawings, tokens, layers, and fog of war
  - name: Sync
    description: Bidirectional sync and external system mapping

paths:
  # --- Campaigns ---
  /campaigns/{campaignId}:
    get:
      tags: [Campaigns]
      summary: Get campaign details
      operationId: getCampaign
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: Campaign details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # --- Entity Types ---
  /campaigns/{campaignId}/entity-types:
    get:
      tags: [Entities]
      summary: List entity types
      operationId: listEntityTypes
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: All entity types for the campaign
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/EntityType"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /campaigns/{campaignId}/entity-types/{typeId}:
    get:
      tags: [Entities]
      summary: Get entity type
      operationId: getEntityType
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/typeId"
      responses:
        "200":
          description: Entity type details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityType"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # --- Entities ---
  /campaigns/{campaignId}/entities:
    get:
      tags: [Entities]
      summary: List entities
      operationId: listEntities
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
        - name: type_id
          in: query
          schema:
            type: integer
        - name: q
          in: query
          description: Search query
          schema:
            type: string
      responses:
        "200":
          description: Paginated entity list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedEntities"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Entities]
      summary: Create entity
      operationId: createEntity
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntityRequest"
      responses:
        "201":
          description: Created entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/entities/{entityId}:
    get:
      tags: [Entities]
      summary: Get entity
      operationId: getEntity
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/entityId"
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    put:
      tags: [Entities]
      summary: Update entity
      operationId: updateEntity
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/entityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntityRequest"
      responses:
        "200":
          description: Updated entity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      tags: [Entities]
      summary: Delete entity
      operationId: deleteEntity
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/entityId"
      responses:
        "204":
          description: Entity deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /campaigns/{campaignId}/entities/{entityId}/fields:
    put:
      tags: [Entities]
      summary: Update entity fields
      operationId: updateEntityFields
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/entityId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fields_data:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Fields updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/entities/{entityId}/relations:
    get:
      tags: [Entities]
      summary: List entity relations
      operationId: listEntityRelations
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/entityId"
      responses:
        "200":
          description: List of relations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Relation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # --- Calendar ---
  /campaigns/{campaignId}/calendar:
    get:
      tags: [Calendar]
      summary: Get calendar
      operationId: getCalendar
      description: Requires calendar addon to be enabled.
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: Full calendar structure with months, weekdays, moons, seasons, eras
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Calendar"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /campaigns/{campaignId}/calendar/date:
    get:
      tags: [Calendar]
      summary: Get current calendar date
      operationId: getCurrentDate
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: Current in-game date/time
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CalendarDate"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    put:
      tags: [Calendar]
      summary: Set current date
      operationId: setCurrentDate
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetDateRequest"
      responses:
        "200":
          description: Date set successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusOk"
                  - $ref: "#/components/schemas/CalendarDate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/events:
    get:
      tags: [Calendar]
      summary: List events
      operationId: listEvents
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - name: year
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: integer
        - name: entity_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Events list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Event"
                  total:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Calendar]
      summary: Create event
      operationId: createEvent
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEventRequest"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/events/{eventId}:
    get:
      tags: [Calendar]
      summary: Get event
      operationId: getEvent
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/eventId"
      responses:
        "200":
          description: Event details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    put:
      tags: [Calendar]
      summary: Update event
      operationId: updateEvent
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/eventId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEventRequest"
      responses:
        "200":
          description: Event updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      tags: [Calendar]
      summary: Delete event
      operationId: deleteEvent
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/eventId"
      responses:
        "204":
          description: Event deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/settings:
    put:
      tags: [Calendar]
      summary: Update calendar settings
      operationId: updateCalendarSettings
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCalendarSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/months:
    put:
      tags: [Calendar]
      summary: Update months
      operationId: updateMonths
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/MonthInput"
      responses:
        "200":
          description: Months updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/weekdays:
    put:
      tags: [Calendar]
      summary: Update weekdays
      operationId: updateWeekdays
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/WeekdayInput"
      responses:
        "200":
          description: Weekdays updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/moons:
    put:
      tags: [Calendar]
      summary: Update moons
      operationId: updateMoons
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/MoonInput"
      responses:
        "200":
          description: Moons updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/eras:
    put:
      tags: [Calendar]
      summary: Update eras
      operationId: updateEras
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/EraInput"
      responses:
        "200":
          description: Eras updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/advance:
    post:
      tags: [Calendar]
      summary: Advance date by days
      operationId: advanceDate
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [days]
              properties:
                days:
                  type: integer
                  minimum: 1
                  maximum: 3650
      responses:
        "200":
          description: Date advanced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusOk"
                  - $ref: "#/components/schemas/CalendarDate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/advance-time:
    post:
      tags: [Calendar]
      summary: Advance time by hours/minutes
      operationId: advanceTime
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                hours:
                  type: integer
                  minimum: 0
                minutes:
                  type: integer
                  minimum: 0
      responses:
        "200":
          description: Time advanced
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/StatusOk"
                  - $ref: "#/components/schemas/CalendarDate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/export:
    get:
      tags: [Calendar]
      summary: Export calendar JSON
      operationId: exportCalendar
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - name: events
          in: query
          description: Include events in export
          schema:
            type: string
            enum: ["true", "false"]
      responses:
        "200":
          description: Calendar export data
          content:
            application/json:
              schema:
                type: object
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/calendar/import:
    post:
      tags: [Calendar]
      summary: Import calendar
      operationId: importCalendar
      description: Accepts Chronicle or Foundry SimpleCalendar JSON format (auto-detected).
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  format:
                    type: string
                  name:
                    type: string
                  months:
                    type: integer
                  weekdays:
                    type: integer
                  moons:
                    type: integer
                  seasons:
                    type: integer
                  eras:
                    type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # --- Media ---
  /campaigns/{campaignId}/media:
    get:
      tags: [Media]
      summary: List media files
      operationId: listMedia
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Paginated media list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/MediaFile"
                  total:
                    type: integer
                  page:
                    type: integer
                  per_page:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Media]
      summary: Upload media file
      operationId: uploadMedia
      description: Max file size 10 MB.
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                usage_type:
                  type: string
                  enum: [attachment, entity_image, avatar, backdrop]
                  default: attachment
      responses:
        "201":
          description: Uploaded media file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/media/stats:
    get:
      tags: [Media]
      summary: Get media storage stats
      operationId: getMediaStats
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: Storage statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_files:
                    type: integer
                  total_bytes:
                    type: integer
                    format: int64
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /campaigns/{campaignId}/media/{mediaId}:
    get:
      tags: [Media]
      summary: Get media file details
      operationId: getMedia
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/mediaId"
      responses:
        "200":
          description: Media file metadata with signed URLs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MediaFile"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      tags: [Media]
      summary: Delete media file
      operationId: deleteMedia
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/mediaId"
      responses:
        "204":
          description: Media deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  # --- Maps ---
  /campaigns/{campaignId}/maps:
    get:
      tags: [Maps]
      summary: List maps
      operationId: listMaps
      description: Requires maps addon to be enabled.
      parameters:
        - $ref: "#/components/parameters/campaignId"
      responses:
        "200":
          description: List of maps
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Map"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"

  /campaigns/{campaignId}/maps/{mapId}:
    get:
      tags: [Maps]
      summary: Get map details
      operationId: getMap
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - $ref: "#/components/parameters/mapId"
      responses:
        "200":
          description: Map with markers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Map"
        "403":
          $ref: "#/components/responses/Forbidden"
