      summary: Batch sync (push/pull changes)
      operationId: sync
      description: >
        Bidirectional sync endpoint. Provide "since" to pull entities modified
        after that timestamp. Provide "changes" array to push create/update/delete
        operations. Max 2000 changes per request.
      parameters:
        - $ref: "#/components/parameters/campaignId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncRequest"
      responses:
        "200":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"

  /campaigns/{campaignId}/sync/mappings:
    get:
      tags: [Sync]
      summary: List sync mappings
      operationId: listSyncMappings
      parameters:
        - $ref: "#/components/parameters/campaignId"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 1000
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Paginated sync mappings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncMapping"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
