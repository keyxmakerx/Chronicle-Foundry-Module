# ============================================================================
# Chronicle Docker Compose
# ============================================================================
# Development and production Docker stack.
# `make docker-up` starts just MariaDB + Redis for local dev.
# `make docker-all` starts the full stack including the app.
#
# For Cosmos Cloud deployment, import this file directly. Cosmos handles
# TLS termination and domain routing -- no exposed ports needed on the app.
# ============================================================================

services:
  # --- Chronicle Application ---
  # The Go binary serves HTTP directly (no nginx needed).
  # Pull from GHCR, or build locally with `docker compose build chronicle`.
  # Cosmos Cloud reverse-proxies to this container.
  chronicle:
    image: ghcr.io/keyxmakerx/chronicle:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chronicle
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      # -- SECURITY: You MUST change these before deploying --
      - ENV=production
      - PORT=8080
      - BASE_URL=http://localhost:8080
      # REQUIRED: Generate a unique key: openssl rand -base64 32
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set. Run openssl rand -base64 32}
      # -- Database (DB_PASSWORD must match MYSQL_PASSWORD below) --
      - DB_HOST=chronicle-db:3306
      - DB_USER=chronicle
      # REQUIRED: Change this password and match MYSQL_PASSWORD below.
      - DB_PASSWORD=${DB_PASSWORD:-chronicle}
      - DB_NAME=chronicle
      - REDIS_URL=redis://chronicle-redis:6379
      # Optional: ClamAV virus scanning (set to empty to disable).
      - CLAMAV_ADDRESS=chronicle-clamav:3310
    depends_on:
      chronicle-db:
        condition: service_healthy
      chronicle-redis:
        condition: service_healthy
      chronicle-clamav:
        condition: service_healthy
    labels:
      # Cosmos Cloud stack labels for auto-discovery
      cosmos-stack: chronicle
      cosmos-stack-main: chronicle

  # --- MariaDB ---
  chronicle-db:
    image: mariadb:10.11
    container_name: chronicle-db
    restart: unless-stopped
    environment:
      # REQUIRED: Change these passwords before deploying.
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootsecret}
      - MYSQL_DATABASE=chronicle
      - MYSQL_USER=chronicle
      - MYSQL_PASSWORD=${DB_PASSWORD:-chronicle}
    volumes:
      - chronicle-dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      cosmos-stack: chronicle

  # --- Redis ---
  # Used for session storage, caching, and rate limiting.
  # 128MB max with LRU eviction -- sessions survive restarts via AOF.
  chronicle-redis:
    image: redis:7-alpine
    container_name: chronicle-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - chronicle-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      cosmos-stack: chronicle

  # --- ClamAV (optional) ---
  # Antivirus scanning for uploaded files. Scans media in-memory via clamd
  # TCP protocol before files are written to disk. Remove or comment out
  # to disable scanning. Set CLAMAV_ADDRESS="" on chronicle service to skip.
  chronicle-clamav:
    image: clamav/clamav:1.4
    container_name: chronicle-clamav
    restart: unless-stopped
    # ClamAV needs time to download signature databases on first start.
    # Subsequent starts are fast (signatures cached in volume).
    volumes:
      - chronicle-clamdata:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    labels:
      cosmos-stack: chronicle

volumes:
  chronicle-dbdata:
    driver: local
  chronicle-redisdata:
    driver: local
  chronicle-clamdata:
    driver: local
